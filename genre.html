<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otkrij Zvuk | Detalji Žanra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .genre-detail-hero {
            padding: 8rem 0 4rem;
            text-align: center;
            position: relative;
        }
        .genre-focus-shape {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.15;
            z-index: -1;
            filter: blur(100px);
        }
        .genre-info-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 4rem;
            margin-top: 3rem;
        }
        .info-block {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        .info-block h3 { margin-bottom: 1rem; color: var(--primary); }
        .tribute-box {
            background-color: rgba(255, 75, 75, 0.1);
            border: 1px solid var(--primary);
            padding: 2.5rem;
            border-radius: 8px;
            margin-top: 3rem;
            text-align: center;
        }
        .tribute-box h2 { color: var(--text-primary); margin-bottom: 1rem; }
        .tribute-box p { font-size: 1.1rem; line-height: 1.8; color: #ffcccc; }
        
        @media (max-width: 768px) {
            .genre-info-grid { grid-template-columns: 1fr; gap: 2rem; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">Otkrij <span>Zvuk</span></a>
            <nav class="nav-links">
                <a href="index.html">Početna</a>
                <a href="index.html#recenzije">Recenzije</a>
                <a href="index.html#zanrovi">Žanrovi</a>
                <a href="index.html#lastfm">Last.fm</a>
            </nav>
        </div>
    </header>

    <main style="min-height: 80vh;">
        <div id="genreContentContainer">
            <div class="loading-state" style="margin-top: 200px;">Učitavanje stranice žanra...</div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 Otkrij Zvuk. Veb Projekat 2.</p>
        </div>
    </footer>

    <script src="./js/app.js"></script>
</body>
</html>
